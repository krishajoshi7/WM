name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# A newer run for the same branch makes the older run irrelevant.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build production application
        run: npm run build

      # These suites use the in-memory smoke store and never contact live Supabase.
      - name: Test golden custody flow
        run: npm run smoke:golden

      - name: Test security boundaries
        run: npm run smoke:security

      - name: Test health endpoint
        run: npm run smoke:health

      - name: Test rate limiting
        run: npm run smoke:rate-limit
